<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ride'n'Rest — Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FFFFFF;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
      padding-top: env(safe-area-inset-top, 2rem);
      padding-bottom: env(safe-area-inset-bottom, 2rem);
      padding-left: env(safe-area-inset-left, 2rem);
      padding-right: env(safe-area-inset-right, 2rem);
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #2D6A4A;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .icon svg { width: 44px; height: 44px; fill: white; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; color: #2D6A4A; }
    p { font-size: 1rem; color: #555; line-height: 1.6; max-width: 320px; }
    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #2D6A4A;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 6l4 4 4-4 4 4 4-4 4 4V2H1v4zm0 8l4 4 4-4 4 4 4-4 4 4v4H1v-4l4-4z"/>
    </svg>
  </div>
  <h1>Vous êtes hors ligne</h1>
  <p>Ride'n'Rest nécessite une connexion internet pour afficher vos aventures et trouver des hébergements.</p>
  <button onclick="window.location.reload()">Réessayer</button>
</body>
</html>

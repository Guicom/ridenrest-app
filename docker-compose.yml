services:
  db:
    image: postgis/postgis:16-3.4
    container_name: ridenrest-db
    platform: linux/amd64 # No native ARM64 build — Rosetta 2 on Mac, native on VPS (x86_64)
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: ridenrest-uptime-kuma
    profiles: ["production"]
    volumes:
      - uptime-kuma-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway" # Required on Linux VPS for host TCP checks
    restart: unless-stopped

  plausible-db:
    image: postgres:16-alpine
    container_name: ridenrest-plausible-db
    profiles: ["production"]
    environment:
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: ${PLAUSIBLE_DB_PASSWORD}
      POSTGRES_DB: plausible
    volumes:
      - plausible-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible -d plausible"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  plausible-events-db:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: ridenrest-plausible-events-db
    profiles: ["production"]
    volumes:
      - plausible-events-data:/var/lib/clickhouse
      - ./clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    cap_add:
      - SYS_NICE      # Required: ClickHouse get_mempolicy needs this on KVM VPS
      - IPC_LOCK
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  plausible:
    image: ghcr.io/plausible/community-edition:v2
    container_name: ridenrest-plausible
    profiles: ["production"]
    environment:
      BASE_URL: https://stats.ridenrest.app
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE}
      TOTP_VAULT_KEY: ${PLAUSIBLE_TOTP_VAULT_KEY}
      DATABASE_URL: postgres://plausible:${PLAUSIBLE_DB_PASSWORD}@plausible-db:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible-events-db:8123/plausible_events
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      plausible-db:
        condition: service_healthy
      plausible-events-db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    profiles: ["production"]
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      STATUS_USER: ${STATUS_USER}
      STATUS_HASHED_PASSWORD: ${STATUS_HASHED_PASSWORD}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway" # Required on Linux VPS (not auto-resolved like macOS)

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
  uptime-kuma-data:
  plausible-db-data:
  plausible-events-data:
